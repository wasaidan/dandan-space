<style>

body{

.sidebar{

.sidebar .site{font-size:15px;font-weight:400;letter-spacing:6px;color:#3d3d3d;margin-bottom:4px}

.wl-header label{color:#888!important}

.tip-side{margin-top:12px;padding-top:12px;border-top:1px solid #eeeae3}
.tip-btn{font-size:11px;color:#d0c0aa;letter-spacing:3px;cursor:pointer;transition:0.3s;padding:4px 0}

.tip-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(60,60,60,0.4);z-index:999;display:none;justify-content:center;align-items:center;animation:fadeIn 0.3s ease;backdrop-filter:blur(2px)}
.tip-overlay.show{display:flex}
.tip-modal{background:#faf8f5;border-radius:12px;padding:40px 36px 32px;max-width:340px;width:90%;text-align:center;position:relative;box-shadow:0 12px 40px rgba(0,0,0,0.08)}
.tip-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:14px;color:#ddd;cursor:pointer;font-family:inherit;transition:0.3s;padding:4px}
.tip-close:hover{color:#888}
.tip-heart{font-size:36px;margin-bottom:12px}
.tip-title{font-size:16px;color:#3d3d3d;letter-spacing:3px;margin-bottom:8px}
.tip-desc{font-size:12px;color:#999;line-height:1.8;letter-spacing:1px;margin-bottom:20px}
.tip-qr-wrap{width:180px;height:180px;margin:0 auto 16px;background:#fff;border-radius:8px;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;border:1px solid #eeeae3}

@media (max-width:800px){.tip-side{display:none}}

<script>
const ARTICLES = [
  {id:'welcome',category:'欢迎来到第三空间',title:'',content:[
    {type:'p',text:'我是丹丹，一个90后人保代理人。'},
    {type:'p',text:'我喜欢记录工作和生活中的感受和觉察。很多人跟我说，他们看到了自己还没有来得及表达或者表达不出来的感受。可能因为我记录的，都是真实走过的路吧。'},
    {type:'p',text:'这个空间，是我把那些记录攒起来的地方。能来到这里，也许你心里也在找着什么。那不是你看到了我，是你找到了自己。'},
    {type:'p',text:'欢迎回家。'}
  ]},
  {id:'to-you-and-me',category:'给自己，也给你',title:'',content:[
    {type:'p',text:'允许自己不完美，允许自己有情绪，允许自己犯错，允许自己慢慢来。'},
    {type:'p',text:'不断了解自己的喜怒哀乐——里面住着过去没有被好好对待过的自己。当你理解了自己，允许了自己，内在松动了，平和了，慢慢地，就会活出一个健康、自在、平和、幸福、清爽、轻松的自己。'},
    {type:'p',text:'那些能滋养我们的人和事，自然会来。'},
    {type:'line',text:'你愿意回头看，就已经在往前走了。\n看见那些没有被好好对待过的自己——那不是脆弱，是你在一点一点把自己接回来。'}
  ]},
  {id:'hug-myself',category:'成长觉察 · 2026.03.18',title:'是我把自己抱回来了',content:[
    {type:'p',text:'我突然看到一个画面：小时候的我、现在的我、未来的我，三个人抱在一起。'},
    {type:'p',text:'以前怕过去的我太弱、太惨、太不值得，所以想否定她、推开她、假装她不存在。\n以前怕未来的我不够好、不够强、不够完美，所以拼命期待、拼命努力、拼命往前赶。'},
    {type:'p',text:'但现在不怕了。因为她们都在这儿，抱着我，我也抱着她们。'},
    {type:'p',text:'不是拼，是抱。不是修理，是接纳。'},
    {type:'p',text:'小时候的我，不再被嫌弃、被否定、被推开。她终于被看见了，被接住了。\n现在的我，不再用"你应该更好"来逼自己。她终于可以喘口气了。\n未来的我，不再是一个需要拼命追赶的目标——她就在这儿，抱着现在的我。'},
    {type:'p',text:'这个画面，是我给自己的家。'}
  ]},
  {id:'past-is-fuel',category:'成长觉察 · 2026.04.16',title:'过去是燃料，现在是脚步',content:[
    {type:'p',text:'我在理清过去、现在、未来的关系时，说出了一句话：未来的我必须要有过去的我做燃料，现在的我去走。'},
    {type:'p',text:'不是割裂，是接力。'},
    {type:'p',text:'以前我想甩掉过去、追赶未来、让现在拼命跑。现在我知道了：过去是燃料，现在是脚步，未来是风景。'},
    {type:'p',text:'没有过去的疼，就没有今天的清醒；没有现在的走，就到不了任何未来。三者不是敌人，是一辆车——过去是油箱，现在是驾驶员，未来是路。'},
    {type:'p',text:'不否定过去，不抛弃现在，不焦虑未来。该加油加油，该开车开车，该看风景看风景。'}
  ]},
  {id:'earthworm',category:'成长觉察 · 2026.04.23',title:'风吹哪页读哪页',content:[
    {type:'p',text:'昨天下楼看到一条蚯蚓在地砖上爬。当时脑子里有个念头：要不要送它去草坪？'},
    {type:'p',text:'另一个念头说：不要干涉他人的因果。走了。'},
    {type:'p',text:'回来的时候，它已经死了。那时候有一点触动。我问自己如果再经历一次，会不会帮它？没有答案。'},
    {type:'p',text:'今天出去，又看到一条蚯蚓在地砖上。我看到自己走过去了，没救。'},
    {type:'p',text:'一边走一边想。走到前面看到一根树枝——我低下身来捡起它，回头把蚯蚓挑着送到了草坪里。'},
    {type:'p',text:'一路走一路想。以后这样的生命都要干预吗？'},
    {type:'p',text:'那就看当时的情况：时间充裕吗？心里有那个想救的念头吗？'},
    {type:'p',text:'有，就做。没有，就走。'},
    {type:'p',text:'不立规矩，不背责任，不给自己贴标签。'},
    {type:'p',text:'风吹哪页读哪页。'}
  ]},{id:'earthworm-2',category:'成长觉察 · 2026.04.23',title:'两条蚯蚓',content:[
    {type:'p',text:'我没有救第一条蚯蚓。那一刻我相信它可以凭自己的本事找到生路。但我后来看到它死了。'},
    {type:'p',text:'看到第二条蚯蚓的时候，我想到了第一条。一开始我没有停下脚步。那时候我想的是——如果我是这条蚯蚓，我是希望有人能伸出援手的。'},
    {type:'p',text:'所以后来我捡了树枝，回了头，去做了那个"有人"。'},
    {type:'p',text:'但如果我是蚯蚓，我也尊重行人。她不可能也不应该为所有的这样的生命停留她的脚步。她首先是她自己。'},
    {type:'p',text:'她可以只为她遇到的那条——和那一刻心里的声音——负责。'}
  ]},{id:'borrowed-hands',category:'成长觉察 · 2026.04.23',title:'被借来的那双手',content:[
    {type:'p',text:'我再努力回想——去捡树枝的那一刻，不是我决定要救那条蚯蚓。'},
    {type:'p',text:'是第二条蚯蚓在水泥地上的挣扎，第一条蚯蚓留下的触动，地上那根树枝恰好存在——所有这些能量汇聚在一起，通过我的手，完成了"把第二条蚯蚓送回泥土"这件事。'},
    {type:'p',text:'我不是救世主。我是被第二条蚯蚓"借来"的那双手。'},
    {type:'p',text:'所有的能量通过我，流向它需要去的地方，完成第二条蚯蚓的自救。'},
    {type:'p',text:'我觉得这才是真相。'},
    {type:'p',text:'这一刻，我升起了前所未有的敬畏之心。'}
  ]},{id:'grandma',category:'成长觉察 · 2026.06.14',title:'在呼吸之间的停顿里和外婆重逢',content:[
    {type:'p',text:'准备睡觉时，我照常把手放在胸口。我发现呼吸和呼吸之间的空隙变大了——一呼一吸之间的停顿时间变长了。这个感觉，像回到了小时候睡在外婆身边的时候。'},
    {type:'p',text:'不是想起外婆，是外婆就在那个停顿里。'},
    {type:'p',text:'以前我怕那种"停顿"——怕空、怕没着落、怕失去控制。今天发现，那个停顿里不是空，是外婆的呼吸声。不是失去，是连接。'},
    {type:'p',text:'原来身体从未忘记。外婆的呼吸节奏刻进了我的神经里，只是以前呼吸太急，没认出它。现在慢下来了，停顿出现了，它就回来了。'},
    {type:'p',text:'这不是悲伤，是重逢。'}
  ]},];

let ci=0;const SK='thirdspace_reactions';
function ra(i){
  const a=ARTICLES[i];if(!a)return;
  const e=document.getElementById('scene-container');
  let h='<div class="scene show"><div class="cat">'+a.category+'</div>';
  if(a.title)h+='<h2>'+a.title+'</h2>';
  a.content.forEach(b=>{
    if(b.type==='p')b.text.split('\n').forEach(l=>{h+='<p class="left">'+l+'</p>'});
    else if(b.type==='line')h+='<div class="line">'+b.text.replace(/\n/g,'<br>')+'</div>';
  });
  h+='<div class="article-tip"><div class="tip-divider">· · ·</div>';if(i===ARTICLES.length-1){h+='<div class="end-note">就到这里了 · 下次见</div>'}h+='<button class="tip-inline-btn" onclick="showTip()">☕ 如果喜欢，随心支持</button></div>';e.innerHTML=h;
  
  document.getElementById('prevBtn').disabled=(i===0);
  document.getElementById('nextBtn').disabled=(i===ARTICLES.length-1);
  document.querySelectorAll('#nav-links a').forEach((e,j)=>{e.classList.toggle('active',j===i)});
  ci=i;
}
function bn(){
  const n=document.getElementById('nav-links');n.innerHTML='';
  ARTICLES.forEach((a,i)=>{
    const l=document.createElement('a');l.href='javascript:void(0)';
    l.textContent=a.title||a.category;
    if(i===0)l.classList.add('active');
    l.addEventListener('click',()=>ra(i));n.appendChild(l);
  });
}
function showTip(){document.getElementById('tipOverlay').classList.add('show')}
function hideTip(){document.getElementById('tipOverlay').classList.remove('show')}
document.addEventListener('DOMContentLoaded',function(){
  var qi=document.getElementById('tipQr'),ph=document.getElementById('tipQrPlaceholder');
  if(qi&&ph){qi.onerror=function(){qi.style.display='none';ph.style.display='block'};qi.onload=function(){ph.style.display='none';qi.style.display='block'}}
});
document.addEventListener('DOMContentLoaded',()=>{
  bn();ra(0);
  document.getElementById('prevBtn').addEventListener('click',()=>{if(ci>0)ra(ci-1)});
  document.getElementById('nextBtn').addEventListener('click',()=>{if(ci<ARTICLES.length-1)ra(ci+1)});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'&&ci>0)ra(ci-1);
    if(e.key==='ArrowRight'&&ci<ARTICLES.length-1)ra(ci+1);
  });
});
</script>
<div class="tip-overlay" id="tipOverlay" onclick="hideTip()">
  <div class="tip-modal" onclick="event.stopPropagation()">
    <button class="tip-close" onclick="hideTip()">✕</button>
    <div class="tip-heart">☕</div>
    <div class="tip-title">请我喝一杯咖啡</div>

      <img src="wechat-pay-qr.png" alt="微信收款码" class="tip-qr" id="tipQr"/>

        <div class="tip-qr-hint">请将你的微信收款码<br>保存为 wechat-pay-qr.png<br>放在本文件夹中</div>
      </div>
    </div>

  </div>
</div>

else{document.getElementById('waline-wrap').innerHTML='<div style="text-align:center;padding:20px 0;color:#d0c0aa;font-size:12px;letter-spacing:2px;line-height:2;">🌱 留言功能正在准备中<br>暂时可以通过微信联系我：18751316413</div>'}
</script>
